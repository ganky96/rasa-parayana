{{ define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="page-intro">{{ . }}</div>{{ end }}
</header>
<ul class="post-list">
  {{ range .Pages }}
  <li>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{- if not .Date.IsZero }} <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>{{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
