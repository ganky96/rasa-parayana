{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    {{- if not .Date.IsZero }}<p class="post-meta"><time datetime='{{ .Date.Format "2006-01-02" }}'>{{ .Date.Format "2006-01-02" }}</time></p>{{ end }}
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  {{- with .Params.tags }}
  <p class="post-tags">{{ range . }}<span class="tag">{{ . }}</span>{{ end }}</p>
  {{ end -}}
</article>
{{ end }}
