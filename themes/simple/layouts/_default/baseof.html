<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  {{- with .Description }}<meta name="description" content="{{ . }}">{{ end -}}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ "index.xml" | relURL }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ "/" | relURL }}">{{ site.Title }}</a>
    {{- with site.Menus.header }}
    <nav class="site-nav">
      {{- range . }}
      <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{- end }}
    </nav>
    {{- end }}
  </header>
  <main class="site-main">
    {{- block "main" . }}{{ end -}}
  </main>
  <footer class="site-footer">
    <p>{{ site.Title }} · {{ now.Format "2006" }}</p>
  </footer>
</body>
</html>
