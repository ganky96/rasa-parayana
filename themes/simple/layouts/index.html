{{ define "main" }}
<article class="home-intro">
  <h1>{{ site.Title }}</h1>
  {{ .Content }}
</article>
<section class="recent-posts">
  <h2>Posts</h2>
  <ul class="post-list">
    {{ range first 20 (where site.RegularPages "Section" "post") }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{- if not .Date.IsZero }} <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>{{ end }}
    </li>
    {{ end }}
  </ul>
  <p class="more"><a href="{{ "/post/" | relURL }}">All posts →</a></p>
</section>
{{ end }}
